<div id="video-container">
    <video id="localVideo" autoplay muted style="width: 250px; border: 2px solid #333;"></video>
    <video id="remoteVideo" autoplay style="width: 250px; border: 2px solid #007bff;"></video>
</div>

<div id="chat-container" style="margin-top: 20px; border: 1px solid #ccc; padding: 10px; width: 500px; margin: 20px auto;">
    <div id="messages" style="height: 200px; overflow-y: scroll; background: white; text-align: left; padding: 5px; border: 1px solid #ddd;"></div>
    <input type="text" id="chat-input" placeholder="Напиши съобщение..." style="width: 80%;">
    <button onclick="sendMessage()">Изпрати</button>
</div>

<div style="margin-top: 10px;">
    <input type="text" id="share-link" readonly style="width: 400px;">
    <button onclick="copyLink()">Копирай линка за покана</button>
</div>
