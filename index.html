<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Platform Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 10px; }
        .video-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        video { width: 100%; max-width: 350px; background: black; border-radius: 10px; border: 2px solid #ccc; }
        #chat-box { height: 150px; border: 1px solid #ddd; overflow-y: auto; background: white; margin: 10px auto; max-width: 500px; padding: 10px; text-align: left; }
        .controls { margin-top: 15px; }
        input { padding: 8px; width: 250px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; margin: 5px; }
    </style>
</head>
<body>

    <h2>Видео Среща</h2>

    <div class="video-container">
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div id="chat-box"></div>
    <input type="text" id="chat-input" placeholder="Напиши съобщение...">
    <button onclick="sendMsg()">Изпрати</button>

    <div class="controls">
        <p>Линк за покана:</p>
        <input type="text" id="share-link" readonly>
        <button onclick="copyLink()">Копирай</button>
        <button onclick="shareScreen()" style="background: green;">Екран</button>
    </div>

<script>
    let localStream;
    let currentConn;
    const peer = new Peer({
        debug: 2 // Това ще ни показва грешки в конзолата (F12)
    });

    // 1. Вземи камерата
    navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(stream => {
            localStream = stream;
            document.getElementById('localVideo').srcObject = stream;
        })
        .catch(err => alert("Грешка с камерата: " + err));

    // 2. Генерирай линк
    peer.on('open', (id) => {
        const url = window.location.href.split('?')[0] + '?room=' + id;
        document.getElementById('share-link').value = url;

        // Ако влизаме през линк:
        const room = new URLSearchParams(window.location.search).get('room');
        if (room) {
            console.log("Звъня на: " + room);
            startConnection(room);
        }
    });

    // Когато някой ни потърси
    peer.on('call', (call) => {
        call.answer(localStream);
        call.on('stream', stream => {
            document.getElementById('remoteVideo').srcObject = stream;
        });
    });

    peer.on('connection', (conn) => {
        setupChat(conn);
    });

    function startConnection(roomId) {
        // Видео
        const call = peer.call(roomId, localStream);
        call.on('stream', stream => {
            document.getElementById('remoteVideo').srcObject = stream;
        });
        // Чат
        const conn = peer.connect(roomId);
        setupChat(conn);
    }

    function setupChat(conn) {
        currentConn = conn;
        conn.on('open', () => console.log("Чатът е свързан!"));
        conn.on('data', data => addMsg("Приятел", data));
    }

    function sendMsg() {
        const input = document.getElementById('chat-input');
        if (currentConn && input.value) {
            currentConn.send(input.value);
            addMsg("Аз", input.value);
            input.value = "";
        } else {
            alert("Няма свързан участник за чат!");
        }
    }

    function addMsg(user, text) {
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div><strong>${user}:</strong> ${text}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function copyLink() {
        const el = document.getElementById('share-link');
        el.select();
        document.execCommand('copy');
        alert("Копирано!");
    }

    async function shareScreen() {
        try {
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            document.getElementById('localVideo').srcObject = screenStream;
            // Тук трябва да се подмени тракът (както в предишния код), но за тест виж дали работи локално първо
        } catch (e) {}
    }
</script>
</body>
</html>
