<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Platform Final</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* Контейнерът за видеата */
.video-container { 
    display: flex; 
    flex-direction: column; /* Подреждаме ги едно под друго за по-лесно управление */
    align-items: center; 
    gap: 15px; 
}

/* Видеото на другия участник - ГЛАВНО */
#remoteVideo { 
    width: 95vw; /* Заема 95% от ширината на екрана */
    max-width: 1000px; /* Но не повече от 1000px */
    height: auto; 
    max-height: 70vh; /* Заема до 70% от височината на екрана */
    border: 3px solid #007bff; 
    background: #000;
}

/* Твоето видео - МАЛКО */
#localVideo { 
    width: 200px; 
    height: 150px; 
    position: fixed; /* Застава над всичко останало */
    bottom: 20px; 
    right: 20px; 
    z-index: 10;
    border: 2px solid #fff;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

/* Адаптация за телефони */
@media (max-width: 600px) {
    #localVideo {
        width: 120px;
        height: 90px;
        bottom: 10px;
        right: 10px;
    }
}
    </style>
</head>
<body>

    <h2>Видео Чат</h2>

    <div class="video-container">
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div id="chat-box"></div>
    
    <div class="controls">
        <input type="text" id="chat-input" placeholder="Напиши съобщение...">
        <button onclick="sendMsg()">Изпрати</button>
        <hr>
        <p style="font-size: 12px; color: #666;">Линк за приятел:</p>
        <input type="text" id="share-link" readonly onclick="this.select()">
        <button onclick="copyLink()">Копирай</button>
        <button class="screen" onclick="shareScreen()">Сподели Екран</button>
    </div>

<script>
    let localStream;
    let currentConn;
    let peer;

    // СТЪПКА 1: Първо пускаме камерата
    navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(stream => {
            localStream = stream;
            document.getElementById('localVideo').srcObject = stream;
            
            // СТЪПКА 2: Чак когато камерата е готова, пускаме PeerJS
            initPeer();
        })
        .catch(err => {
            alert("Грешка: Трябва да разрешите камерата!");
            console.error(err);
        });

    function initPeer() {
        peer = new Peer();

        peer.on('open', (id) => {
            const url = window.location.origin + window.location.pathname + '?room=' + id;
            document.getElementById('share-link').value = url;

            const room = new URLSearchParams(window.location.search).get('room');
            if (room) {
                // Ако сме влезли през линк, звъним автоматично
                connectToPeer(room);
            }
        });

        // Когато някой ни потърси (за Лаптопа)
        peer.on('call', (call) => {
            call.answer(localStream);
            call.on('stream', s => document.getElementById('remoteVideo').srcObject = s);
        });

        peer.on('connection', (conn) => {
            setupChat(conn);
        });
    }

    function connectToPeer(roomId) {
        // Видео връзка
        const call = peer.call(roomId, localStream);
        call.on('stream', s => document.getElementById('remoteVideo').srcObject = s);
        
        // Чат връзка
        const conn = peer.connect(roomId);
        setupChat(conn);
    }

    function setupChat(conn) {
        currentConn = conn;
        conn.on('open', () => addMsg("Система", "Свързани за чат!"));
        conn.on('data', data => addMsg("Приятел", data));
    }

    function sendMsg() {
        const input = document.getElementById('chat-input');
        if (currentConn && currentConn.open) {
            currentConn.send(input.value);
            addMsg("Аз", input.value);
            input.value = "";
        } else {
            alert("Все още няма връзка с друг потребител!");
        }
    }

    function addMsg(user, text) {
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div><strong>${user}:</strong> ${text}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function copyLink() {
        const el = document.getElementById('share-link');
        el.select();
        navigator.clipboard.writeText(el.value);
        alert("Линкът е копиран!");
    }

  async function shareScreen() {
    try {
        // 1. Стартираме споделянето на екран
        const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        const videoTrack = screenStream.getVideoTracks()[0];
        
        // Показваме екрана в малкото прозорче
        document.getElementById('localVideo').srcObject = screenStream;

        // Изпращаме екрана към другия човек
        replaceTrack(videoTrack);

        // 2. МАГИЯТА: Какво става, когато натиснеш "Stop Sharing" от лентата на браузъра
        videoTrack.onended = async () => {
            try {
                // Вземаме ПРЯСЪК поток от камерата
                const camStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localStream = camStream; // Обновяваме глобалната променлива
                
                // Закачаме го обратно към прозорчето
                const vElement = document.getElementById('localVideo');
                vElement.srcObject = camStream;
                vElement.play(); // За всеки случай го караме да тръгне

                // Пращаме камерата обратно на другия човек
                const camTrack = camStream.getVideoTracks()[0];
                replaceTrack(camTrack);
                
                console.log("Камерата е възстановена успешно.");
            } catch (err) {
                console.error("Неуспешно връщане на камерата:", err);
            }
        };
    } catch (e) { 
        console.error("Грешка при споделяне:", e); 
    }
}

// Помощна функция за подмяна на трак (увери се, че я имаш)
function replaceTrack(newTrack) {
    if (peer && peer.connections) {
        for (let id in peer.connections) {
            peer.connections[id].forEach(c => {
                if (c.peerConnection) {
                    const sender = c.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender) {
                        sender.replaceTrack(newTrack);
                    }
                }
            });
        }
    }
}
</script>
</body>
</html>
